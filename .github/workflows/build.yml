# .github/workflows/build.yml
name: Build All (including Docker)

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Modify port for Hugging Face
        run: |
          sed -i 's/"port", "18800"/"port", "7860"/g' web/backend/main.go
          echo "Port changed to 7860"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: make build-all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repository name to lowercase
        id: lowercase
        run: |
          # 将仓库名转换为小写
          LOWERCASE_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "lowercase_repo=$LOWERCASE_REPO" >> $GITHUB_OUTPUT
          echo "Original: ${{ github.repository }}"
          echo "Lowercase: $LOWERCASE_REPO"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.launcher
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.lowercase.outputs.lowercase_repo }}-hf:latest
            ghcr.io/${{ steps.lowercase.outputs.lowercase_repo }}-hf:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          # 测试构建的镜像
          IMAGE_NAME="ghcr.io/${{ steps.lowercase.outputs.lowercase_repo }}-hf:latest"
          echo "Testing image: $IMAGE_NAME"
          
          docker pull $IMAGE_NAME
          docker run -d --name test-picoclaw -p 7860:7860 $IMAGE_NAME
          sleep 10
          
          if curl -s http://localhost:7860 > /dev/null; then
            echo "✅ Success! PicoClaw is running on port 7860"
            echo "Access at: http://localhost:7860"
          else
            echo "❌ Failed to start"
            docker logs test-picoclaw
            exit 1
          fi
          
          docker rm -f test-picoclaw
