# .github/workflows/hf-build.yml
name: Build for Hugging Face

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    outputs:
      image_name: ${{ steps.setup.outputs.image_name }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup variables
        id: setup
        run: |
          # 转换为小写
          LOWERCASE_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image_name=${LOWERCASE_REPO}-hf" >> $GITHUB_OUTPUT
          echo "Repository: ${{ github.repository }}"
          echo "Lowercase: ${LOWERCASE_REPO}"
          echo "Image: ${REGISTRY}/${LOWERCASE_REPO}-hf"
      
      - name: Modify port configuration
        run: |
          echo "Changing default port from 18800 to 7860..."
          sed -i 's/"port", "18800"/"port", "7860"/g' web/backend/main.go
          sed -i 's/18800/7860/g' web/backend/api/gateway_host.go 2>/dev/null || true
          echo "Port modification complete"
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      
      - name: Setup Node.js and pnpm
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable && corepack prepare pnpm@latest --activate
      
      - name: Build frontend
        run: |
          cd web/frontend && pnpm install && pnpm build:backend
      
      - name: Build binaries
        run: |
          make build-all
          echo "Build complete. Binaries in build/:"
          ls -lh build/
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.goreleaser.launcher  # 修复这里！
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.setup.outputs.image_name }}:latest
            ${{ env.REGISTRY }}/${{ steps.setup.outputs.image_name }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Test the built image
        run: |
          IMAGE_NAME="${{ env.REGISTRY }}/${{ steps.setup.outputs.image_name }}:latest"
          echo "Testing image: ${IMAGE_NAME}"
          
          docker pull ${IMAGE_NAME}
          
          # 运行容器
          docker run -d --name picoclaw-test -p 7860:7860 ${IMAGE_NAME}
          sleep 10
          
          # 健康检查
          if curl -s -f http://localhost:7860 > /dev/null; then
            echo "✅ Web UI is accessible on port 7860"
          else
            echo "❌ Web UI not accessible"
            docker logs picoclaw-test
            exit 1
          fi
          
          # 清理
          docker rm -f picoclaw-test
          echo "Test completed successfully!"
